services:
  backend:
    container_name: api-estetica-fernanda-lima
    image: backend-clinica
    build:
      context: ./backend/esteticaFernandaLima
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DB_URL: "jdbc:mysql://host.docker.internal:3306/esteticafernandalima?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=America/Sao_Paulo"
      DB_USER: "${DB_USER:-root}"
      DB_PASS: "${DB_PASSWORD:-sua_senha}"
      ORDEMSERVICO_MS_BASE_URL: "http://ordem-servico-ms:8081"
      ORDEMSERVICO_MS_TIMEOUT_MS: "5000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - ordem-servico-ms
    networks:
      - clinica-network

  ordem-servico-ms:
    container_name: api-ordem-servico-ms
    image: ordem-servico-ms
    build:
      context: ./backend/ordem-servico-ms
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://host.docker.internal:3306/esteticafernandalima?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=America/Sao_Paulo"
      SPRING_DATASOURCE_USERNAME: "${DB_USER:-root}"
      SPRING_DATASOURCE_PASSWORD: "${DB_PASSWORD:-sua_senha}"
      RABBITMQ_HOST: "host.docker.internal"
      RABBITMQ_PORT: "5672"
      RABBITMQ_USERNAME: "${RABBITMQ_USERNAME:-fernanda}"
      RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD:-fernanda123}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - clinica-network

  frontend:
    container_name: frontend-clinica
    image: frontend-clinica
    build:
      context: ./frontend/clinica podologia/react-app
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: "${VITE_API_BASE_URL:-http://localhost:8080}"
        VITE_ORDEM_SERVICO_BASE_URL: "${VITE_ORDEM_SERVICO_BASE_URL:-http://localhost:8081}"
        VITE_API_BASE_URL_DEV: "${VITE_API_BASE_URL_DEV:-http://localhost:8080}"
        VITE_API_BASE_URL_PROD: "${VITE_API_BASE_URL_PROD:-http://localhost:8080}"
        VITE_API_MS_BASE_URL_DEV: "${VITE_API_MS_BASE_URL_DEV:-http://localhost:8081}"
        VITE_API_MS_BASE_URL_PROD: "${VITE_API_MS_BASE_URL_PROD:-http://localhost:8081}"
        VITE_API_TIMEOUT_MS: "${VITE_API_TIMEOUT_MS:-15000}"
        VITE_API_MS_TIMEOUT_MS: "${VITE_API_MS_TIMEOUT_MS:-20000}"
        VITE_ORDEM_SERVICO_ENDPOINT: "${VITE_ORDEM_SERVICO_ENDPOINT:-/ordens-servico}"
    ports:
      - "3000:80"
    depends_on:
      - backend
      - ordem-servico-ms
    networks:
      - clinica-network

networks:
  clinica-network:
    driver: bridge
