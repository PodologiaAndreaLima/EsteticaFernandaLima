spring.application.name=ordem-servico-ms

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

spring.datasource.url=jdbc:mysql://localhost:3306/esteticafernandalima?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=America/Sao_Paulo
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:sua_senha}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=8081

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:fernanda}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:sua_senha}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST:/}

rabbitmq.exchange.ordem-servico=ordem-servico.exchange
rabbitmq.queue.ordem-servico=ordem-servico.queue
rabbitmq.queue.ordem-servico-dlq=ordem-servico.dlq
rabbitmq.routing-key.ordem-servico=ordem-servico.evento
rabbitmq.routing-key.ordem-servico-dlq=ordem-servico.dlq

# Monitoring and Health Checks
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=always
management.health.rabbit.enabled=true

