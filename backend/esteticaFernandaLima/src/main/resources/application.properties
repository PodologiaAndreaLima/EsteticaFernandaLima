spring.application.name=esteticaFernandaLima

#Swagger
springdoc.swagger-ui.enabled=true

server.error.include-message=always
server.error.include-binding-errors=always
spring.sql.init.mode=never
spring.sql.init.encoding=UTF-8

#JWT
# garantir que o Hibernate crie o schema antes do data.sql
spring.jpa.defer-datasource-initialization=true

# JWT
jwt.validity=3600000
jwt.secret=RXhpc3RlIHVtYSB0ZW9yaWEgcXVlIGRpeiBxdWUsIHNlIHVtIGRpYSBhbGd16W0gZGVzY29icmlyIGV4YXRhbWVudGUgcGFyYSBxdWUgc2VydmUgbyBVbml2Z

spring.datasource.url=jdbc:mysql://localhost:3306/esteticafernandalima?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=America/Sao_Paulo
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# opcional: se quiser manter o dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

