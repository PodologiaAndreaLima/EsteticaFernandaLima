spring.application.name=esteticaFernandaLima

# Configuracoes do Swagger
springdoc.swagger-ui.enabled=true

server.error.include-message=always
server.error.include-binding-errors=always
spring.datasource.url=jdbc:h2:mem:teste-security
spring.h2.console.enabled=true
spring.datasource.username=admin
spring.datasource.password=admin
spring.jpa.defer-datasource-initialization=true

# tempo de expiracao do token em milissegundos (esse valor indica que ele vai expirar em 1 hora)
jwt.validity=3600000
# palavra passe do token (segredo) necessita de no minimo 32 caracteres e serve para assinar e verificar os tokens, sendo
# recomendavel usar uma chave complexa e dificil de advinhar para aumentar a seguranca da aplicacaoo
